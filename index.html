<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Cachucha Graphic | Impresión & Bordados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">
    <style>
        .carousel-cell { width: 100%; height: 400px; margin-right: 15px; border-radius: 20px; overflow: hidden; }
        .carousel-cell img { width: 100%; height: 100%; object-fit: cover; }
        @media (min-width: 768px) { .carousel-cell { width: 50%; } }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <img src="LOGO LA CACHUCHA.png" class="h-12 w-auto" alt="Logo">
        <a href="https://wa.me/18099140210" class="bg-green-500 text-white px-5 py-2 rounded-full font-bold flex items-center gap-2">
            <i class="fab fa-whatsapp"></i> COTIZAR
        </a>
    </nav>

    <header class="bg-slate-900 text-white py-20 text-center px-6">
        <h1 class="text-4xl md:text-6xl font-black uppercase italic mb-4">La Cachucha Graphic</h1>
        <p class="text-blue-300 text-lg">DTF UV, Textil y Bordados en la Zona Colonial</p>
    </header>

    <section class="py-12 bg-white">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-2xl font-black mb-8 border-l-8 border-blue-600 pl-4 uppercase">Nuestra Producción</h2>
            <div class="main-carousel" data-flickity='{ "cellAlign": "left", "contain": true, "autoPlay": true, "wrapAround": true }'>
                <div class="carousel-cell"><img src="CAMISETA DTF TEX.webp"></div>
                <div class="carousel-cell"><img src="POLO BORDADO.jpg"></div>
                <div class="carousel-cell"><img src="DTF UVV.webp"></div>
                <div class="carousel-cell"><img src="BORDADOOO.webp"></div>
                <div class="carousel-cell"><img src="SUBLIMACION POR METRO.jpg"></div>
                <div class="carousel-cell"><img src="DTF TEX.jpeg"></div>
            </div>
        </div>
    </section>

    <section class="py-12 px-6">
        <div class="max-w-lg mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black text-center mb-6 italic">COTIZADOR RÁPIDO</h2>
            <div class="space-y-4">
                <input type="text" id="nombre" placeholder="Nombre o Negocio" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <select id="servicio" class="w-full p-4 bg-slate-100 rounded-2xl outline-none" onchange="calc()">
                    <option value="350">DTF Textil (RD$350 yarda)</option>
                    <option value="900">DTF UV (RD$900 yarda)</option>
                    <option value="150">Bordado (RD$150 unidad)</option>
                    <option value="300">Sublimación (RD$300 metro)</option>
                </select>
                <input type="number" id="cant" value="1" min="1" class="w-full p-4 bg-slate-100 rounded-2xl" oninput="calc()">
                <div class="bg-slate-950 text-white p-6 rounded-3xl text-center">
                    <p class="text-xs text-slate-400 uppercase font-bold">Total Estimado</p>
                    <div class="text-5xl font-black text-green-400" id="totalDisplay">RD$ 350</div>
                </div>
                <button onclick="enviar()" class="w-full bg-green-500 text-white font-black py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp text-xl"></i> ENVIAR PEDIDO
                </button>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-slate-400 text-sm">
        <p>Av. Mella 410, Zona Colonial, Santo Domingo</p>
    </footer>

    <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
    <script>
        function calc() {
            let p = document.getElementById('servicio').value;
            let c = document.getElementById('cant').value;
            let total = p * c;
            document.getElementById('totalDisplay').innerText = "RD$ " + total.toLocaleString();
        }
        function enviar() {
            let n = document.getElementById('nombre').value || "Cliente";
            let s = document.getElementById('servicio').options[document.getElementById('servicio').selectedIndex].text;
            let t = document.getElementById('totalDisplay').innerText;
            let m = `*LA CACHUCHA GRAPHIC*\nCliente: ${n}\nServicio: ${s}\nTotal: ${t}`;
            window.open(`https://wa.me/18099140210?text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
